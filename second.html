<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>멀리서도 온오프 멀티탭</title>
    <!-- MQTT & Chart.js -->
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b1120;
            --card-bg: rgba(30, 41, 59, 0.4);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.4);
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.4);
            --danger: #f43f5e;
            --danger-glow: rgba(244, 63, 94, 0.4);
            --off-color: #334155;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, var(--bg-color));
            color: var(--text-main);
            margin: 0;
            padding: 15px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden; /* 스크롤 없애기 */
            box-sizing: border-box;
        }

        .header {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px; /* 여백 축소 */
        }

        .header h1 {
            margin: 0;
            font-weight: 800;
            font-size: 1.5rem; /* 폰트 축소 */
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--off-color);
        }

        .dot.online { background: var(--success); box-shadow: 0 0 10px var(--success-glow); }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: minmax(0, 1fr) auto; /* 차트 행은 최대한 늘리고, 버튼 행은 필요한 만큼만 */
            gap: 15px; /* 간격 축소 */
            width: 100%;
            max-width: 900px;
            flex: 1; /* 가용 공간 채우기 */
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 16px; /* 둥글기 약간 축소 */
            padding: 15px; /* 내부 여백 축소 */
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s;
        }

        .card:hover { border-color: rgba(255,255,255,0.15); }
        .full-width { grid-column: span 2; }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px; /* 축소 */
            color: var(--text-sub);
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* Gauge Area */
        .gauge-container {
            position: relative;
            width: 100%;
            flex: 1; /* 남은 공간 모두 차지하게 */
            min-height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .current-display {
            position: absolute;
            bottom: 0px;
            text-align: center;
        }

        .current-val {
            font-size: 2.2rem; /* 폰트 축소 */
            font-weight: 800;
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent-glow);
            line-height: 1;
        }

        /* Power Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 5px;
        }

        .stat-box {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 10px; /* 패딩 축소 */
            text-align: center;
        }

        .stat-label { font-size: 0.75rem; color: var(--text-sub); margin-bottom: 4px; }
        .stat-value { font-size: 1.2rem; font-weight: 700; color: #fff; }

        /* Servo Controls */
        .servo-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .servo-badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            background: var(--off-color);
        }

        .servo-badge.on { background: var(--success); color: #fff; box-shadow: 0 0 10px var(--success-glow); }
        .servo-badge.trip { background: var(--danger); animation: trip-blink 1s infinite;}

        @keyframes trip-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .btn-group { display: flex; gap: 8px; flex: 1; align-items: stretch;}

        button {
            flex: 1;
            padding: 10px; /* 버튼 패딩 축소 */
            border-radius: 10px;
            border: none;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: white;
            font-family: inherit;
        }

        .btn-on { background: linear-gradient(135deg, #10b981, #059669); }
        .btn-on:hover { box-shadow: 0 0 15px var(--success-glow); transform: translateY(-2px); }
        
        .btn-off { background: linear-gradient(135deg, #475569, #334155); }
        .btn-off:hover { background: #64748b; transform: translateY(-2px); }

        button:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

        #trip-alert {
            background: rgba(244, 63, 94, 0.15);
            border: 1px solid var(--danger);
            color: #ffb3c1;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 1024px) {
            /* 태블릿 화면: 2단 유지하되 스크롤 허용 및 여백 조정 */
            body { overflow: auto; padding: 20px 15px; min-height: 100vh; }
            .dashboard { 
                grid-template-rows: auto; 
                overflow: visible; 
            }
            .gauge-container { height: 160px; }
        }

        @media (max-width: 768px) {
            /* 모바일 화면: 1단 세로 배치, 터치 친화적 UI */
            .dashboard { grid-template-columns: 1fr; gap: 20px;}
            .full-width { grid-column: span 1; }
            
            button { 
                padding: 18px; /* 손가락으로 누르기 쉽게 버튼 크게 */
                font-size: 1.1rem; 
                border-radius: 12px;
            }
            
            .card { padding: 20px; border-radius: 20px; }
            .header h1 { font-size: 1.8rem; }
            .current-val { font-size: 3rem; }
            .gauge-container { height: 200px; }
            
            /* 모바일에서는 히스토리 차트 높이를 적절히 고정 */
            #lineChart { min-height: 220px; }
        }

    </style>
</head>
<body>

    <div class="header">
        <h1></h1>
        <div class="status-badge" id="conn-status">
            <div class="dot" id="conn-dot"></div>
            <span id="conn-text">연결 중...</span>
        </div>
    </div>

    <div class="dashboard">
        <!-- 1. 메인 게이지 카드 (좌측 상단) -->
        <div class="card" style="display: flex; flex-direction: column;">
            <div class="card-header">
                <span>실시간 전력 모니터링</span>
                <span id="last-update" style="font-size: 0.8rem; opacity: 0.7;">대기중</span>
            </div>
            
            <div class="gauge-container">
                <canvas id="gaugeChart"></canvas>
                <div class="current-display">
                    <div class="current-val" id="curr-val">0.00</div>
                    <div style="color: var(--text-sub); font-weight: 600; margin-top: 5px;">AMPERE (A)</div>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">소비 전력 (W)</div>
                    <div class="stat-value" id="watt-val">0 W</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">최대 피크 전류</div>
                    <div class="stat-value" id="peak-val">0.00 A</div>
                </div>
            </div>

            <div id="trip-alert">⚠️ 과부하 차단 작동됨! 기기를 분리하여 부하를 낮춰주세요. (자동 복구)</div>
        </div>

        <!-- 2. 히스토리 차트 (우측 상단, 게이지와 나란히 배치) -->
        <div class="card" style="display: flex; flex-direction: column;">
            <div class="card-header">전류 트렌드 히스토리</div>
            <div style="flex: 1; position: relative; min-height: 200px;">
                <canvas id="lineChart" style="position: absolute; top:0; left:0; width:100%; height:100%;"></canvas>
            </div>
        </div>

        <!-- 3. 서보 1 카드 (좌측 하단) -->
        <div class="card">
            <div class="servo-title">
                모터 1
                <div id="s1-badge" class="servo-badge">OFF</div>
            </div>
            <div class="btn-group">
                <button class="btn-on" onclick="sendCmd('servo1', 'on')">전원 켜기</button>
                <button class="btn-off" onclick="sendCmd('servo1', 'off')">전원 끄기</button>
            </div>
        </div>

        <!-- 4. 서보 2 카드 (우측 하단) -->
        <div class="card">
            <div class="servo-title">
                모터 2
                <div id="s2-badge" class="servo-badge">OFF</div>
            </div>
            <div class="btn-group">
                <button class="btn-on" onclick="sendCmd('servo2', 'on')">전원 켜기</button>
                <button class="btn-off" onclick="sendCmd('servo2', 'off')">전원 끄기</button>
            </div>
        </div>
    </div>

    <script>
        // MQTT 설정
        const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');
        const STATUS_TOPIC = 'yujun_powerstrip/status';
        const CTRL_PREFIX = 'yujun_powerstrip/control/';

        // 상태 변수
        let maxPeak = 0.0;
        const VOLTAGE = 220; // 한국 220V 기준
        const MAX_CURRENT_LIMIT = 3.0; // 게이지 최대치

        // Chart.js 공통 폰트 설정
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.font.family = "'Pretendard', sans-serif";

        // 1. 게이지 차트 (Doughnut)
        const gaugeCtx = document.getElementById('gaugeChart').getContext('2d');
        const gaugeChart = new Chart(gaugeCtx, {
            type: 'doughnut',
            data: {
                labels: ['Current', 'Remaining'],
                datasets: [{
                    data: [0, MAX_CURRENT_LIMIT],
                    backgroundColor: ['#38bdf8', 'rgba(255,255,255,0.05)'],
                    borderWidth: 0,
                    circumference: 180,
                    rotation: 270,
                    borderRadius: 10
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '85%',
                plugins: { legend: { display: false }, tooltip: { enabled: false } },
                animation: { animateRotate: false, animateScale: false }
            }
        });

        // 2. 라인 차트
        const lineCtx = document.getElementById('lineChart').getContext('2d');
        const gradient = lineCtx.createLinearGradient(0, 0, 0, 250);
        gradient.addColorStop(0, 'rgba(56, 189, 248, 0.5)');
        gradient.addColorStop(1, 'rgba(56, 189, 248, 0.0)');

        const lineChart = new Chart(lineCtx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: '전류 (A)',
                    data: [],
                    borderColor: '#38bdf8',
                    backgroundColor: gradient,
                    borderWidth: 2,
                    tension: 0.4,
                    fill: true,
                    pointRadius: 0,
                    pointHitRadius: 10
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { 
                    y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } },
                    x: { grid: { display: false }, ticks: { maxTicksLimit: 6 } }
                },
                plugins: { legend: { display: false } },
                animation: { duration: 0 } // 깜빡임 방지
            }
        });

        // MQTT 연결 이벤트
        client.on('connect', () => {
            document.getElementById('conn-text').innerText = '온라인';
            document.getElementById('conn-dot').classList.add('online');
            client.subscribe(STATUS_TOPIC);
        });

        client.on('error', () => {
            document.getElementById('conn-text').innerText = '오프라인';
            document.getElementById('conn-dot').classList.remove('online');
        });

        // MQTT 메시지 수신 버퍼 카운트 (차트 X축 라벨용)
        let msgCount = 0;

        client.on('message', (topic, message) => {
            if (topic === STATUS_TOPIC) {
                try {
                    const data = JSON.parse(message.toString());
                    const current = parseFloat(data.current) || 0;
                    const s1 = data.s1;
                    const s2 = data.s2;
                    const isTripped = data.tripped;

                    // 상태 업데이트
                    updateUI(current, s1, s2, isTripped);
                    
                } catch(e) {
                    console.error("데이터 파싱 에러", e);
                }
            }
        });

        function updateUI(current, s1, s2, isTripped) {
            // 시간 업데이트
            const now = new Date();
            document.getElementById('last-update').innerText = `마지막 업데이트: ${now.toLocaleTimeString()}`;

            // 게이지 & 숫자 업데이트
            document.getElementById('curr-val').innerText = current.toFixed(2);
            
            // 색상 경고 로직 (위험 수치일 경우 빨간색)
            let color = '#38bdf8'; // 기본 파랑
            if (isTripped) color = '#f43f5e'; // 트립 시 무조건 빨강
            else if (current > MAX_CURRENT_LIMIT * 0.8) color = '#fbbf24'; // 80% 주황

            gaugeChart.data.datasets[0].data = [current, Math.max(0, MAX_CURRENT_LIMIT - current)];
            gaugeChart.data.datasets[0].backgroundColor[0] = color;
            document.getElementById('curr-val').style.color = color;
            document.getElementById('curr-val').style.textShadow = `0 0 20px ${color}66`; // glow
            gaugeChart.update();

            // 계산 (W, Peak)
            const watt = (current * VOLTAGE).toFixed(0);
            if(current > maxPeak) maxPeak = current;
            
            document.getElementById('watt-val').innerText = `${watt} W`;
            document.getElementById('peak-val').innerText = `${maxPeak.toFixed(2)} A`;

            // 배지 & 버튼 상태
            const s1Badge = document.getElementById('s1-badge');
            const s2Badge = document.getElementById('s2-badge');
            const tripAlert = document.getElementById('trip-alert');
            const buttons = document.querySelectorAll('button');

            if (isTripped) {
                s1Badge.className = 'servo-badge trip'; s1Badge.innerText = 'TRIP';
                s2Badge.className = 'servo-badge trip'; s2Badge.innerText = 'TRIP';
                tripAlert.style.display = 'block';
                buttons.forEach(b => b.disabled = true);
            } else {
                s1Badge.className = `servo-badge ${s1 === 'ON' ? 'on' : ''}`;
                s1Badge.innerText = s1;
                s2Badge.className = `servo-badge ${s2 === 'ON' ? 'on' : ''}`;
                s2Badge.innerText = s2;
                tripAlert.style.display = 'none';
                buttons.forEach(b => b.disabled = false);
            }

            // 라인 차트 업데이트
            msgCount++;
            const timeLabel = (msgCount % 5 === 0) ? now.toLocaleTimeString() : '';
            lineChart.data.labels.push(timeLabel);
            lineChart.data.datasets[0].data.push(current);

            // 30개 데이터 유지
            if(lineChart.data.labels.length > 30){
                lineChart.data.labels.shift();
                lineChart.data.datasets[0].data.shift();
            }
            lineChart.update();
        }

        function sendCmd(servo, cmd) {
            client.publish(CTRL_PREFIX + servo, cmd);
        }
    </script>
</body>
</html>
